name: Check

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-test.txt
      - name: Ruff
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy custom_components/normify
      - name: Pytest
        run: pytest --cov --cov-report=term-missing --cov-report=xml
