name: HACS

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Keep the official HACS validator visible, but do not let its current
      # manifest-parsing regression fail an otherwise valid repository.
      - name: Official HACS validation
        continue-on-error: true
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands

      # Deterministically validate the repository files that HACS requires.
      - name: Validate HACS repository metadata
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path.cwd()
          hacs_path = root / "hacs.json"
          manifest_path = root / "custom_components" / "normify" / "manifest.json"

          for path in (hacs_path, manifest_path):
              if not path.is_file():
                  raise SystemExit(f"Missing required file: {path.relative_to(root)}")

          with hacs_path.open(encoding="utf-8") as file:
              hacs = json.load(file)
          with manifest_path.open(encoding="utf-8") as file:
              manifest = json.load(file)

          if not isinstance(hacs, dict):
              raise SystemExit("hacs.json must contain a JSON object")
          if not isinstance(manifest, dict):
              raise SystemExit("manifest.json must contain a JSON object")

          allowed_hacs_keys = {
              "name",
              "homeassistant",
              "hacs",
              "content_in_root",
              "zip_release",
              "filename",
              "hide_default_branch",
              "country",
              "persistent_directory",
          }
          unsupported = sorted(set(hacs) - allowed_hacs_keys)
          if unsupported:
              raise SystemExit(
                  "Unsupported hacs.json keys: " + ", ".join(unsupported)
              )

          required_manifest_keys = {
              "domain",
              "name",
              "version",
              "documentation",
              "issue_tracker",
              "codeowners",
          }
          missing = sorted(required_manifest_keys - set(manifest))
          if missing:
              raise SystemExit(
                  "Missing manifest.json keys: " + ", ".join(missing)
              )

          if manifest["domain"] != "normify":
              raise SystemExit("manifest domain must be 'normify'")
          if not isinstance(manifest["codeowners"], list) or not manifest["codeowners"]:
              raise SystemExit("manifest codeowners must be a non-empty list")

          print("HACS repository metadata is valid")
          PY
